apiVersion: batch/v1
kind: Job
metadata:
  name: lab5-load-backend
  namespace: lab5-fastapi
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: lab5-load
    spec:
      restartPolicy: Never
      containers:
        - name: fortio
          image: fortio/fortio:1.63.5
          args:
            - load
            - "-c"
            - "32"
            - "-qps"
            - "50"
            - "-t"
            - "120s"
            - "http://backend-service:8000/api/info"