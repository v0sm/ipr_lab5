apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lab5-ingress
  namespace: lab5-fastapi
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  rules:
    - host: lab5.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80